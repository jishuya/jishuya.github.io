<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:before와 ::after 연습</title>
</head>
<body>
    <style>
        .custom-label {
        position: relative;
        font-size: 24px;
        }

        .custom-label::before {
        content: 'Hi, '; 
        }

        .custom-label::after {
        content: ' \2605'; 
        }
    </style>
    <div class="custom-label">Stars!</div>
</body>
</html>
